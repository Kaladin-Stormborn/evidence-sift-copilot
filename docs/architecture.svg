<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Evidence SIFT Copilot architecture</title>
  <desc id="desc">Case evidence flows through an agent planner, plan validator, allowlisted tool runner, audit logs, claim ledger, claim guard, and final report.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .model { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 12; }
      .guard { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 12; }
      .artifact { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, sans-serif; font-size: 21px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .rail { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="60" y="58" class="text" style="font-size:32px">Evidence SIFT Copilot</text>
  <text x="60" y="88" class="small">Agentic planning, deterministic evidence collection, and claim-level auditability.</text>

  <rect class="box" x="70" y="150" width="210" height="92"/>
  <text x="95" y="188" class="text">Case Folder</text>
  <text x="95" y="215" class="small">Protocol SIFT-style</text>
  <text x="95" y="235" class="small">evidence + instructions</text>

  <rect class="box" x="365" y="150" width="210" height="92"/>
  <text x="390" y="188" class="text">Inventory</text>
  <text x="390" y="215" class="small">Read-only previews</text>
  <text x="390" y="235" class="small">case context</text>

  <rect class="model" x="660" y="150" width="250" height="92"/>
  <text x="685" y="188" class="text">GPT-5.5 Planner</text>
  <text x="685" y="215" class="small">Selects investigation</text>
  <text x="685" y="235" class="small">steps from allowlist</text>

  <rect class="guard" x="660" y="320" width="250" height="92"/>
  <text x="685" y="358" class="text">Plan Validator</text>
  <text x="685" y="385" class="small">Rejects unsupported</text>
  <text x="685" y="405" class="small">tools or missing guard</text>

  <rect class="guard" x="365" y="320" width="250" height="92"/>
  <text x="390" y="358" class="text">Tool Runner</text>
  <text x="390" y="385" class="small">Deterministic, read-only</text>
  <text x="390" y="405" class="small">DFIR functions</text>

  <rect class="artifact" x="70" y="500" width="230" height="96"/>
  <text x="95" y="536" class="text">Audit Log</text>
  <text x="95" y="563" class="small">JSONL command trail</text>
  <text x="95" y="583" class="small">inputs and summaries</text>

  <rect class="artifact" x="365" y="500" width="230" height="96"/>
  <text x="390" y="536" class="text">Claim Ledger</text>
  <text x="390" y="563" class="small">Supported, partial,</text>
  <text x="390" y="583" class="small">or needs artifact</text>

  <rect class="guard" x="660" y="500" width="230" height="96"/>
  <text x="685" y="536" class="text">Claim Guard</text>
  <text x="685" y="563" class="small">Downgrades claims</text>
  <text x="685" y="583" class="small">without evidence</text>

  <rect class="artifact" x="945" y="500" width="190" height="96"/>
  <text x="970" y="536" class="text">Report</text>
  <text x="970" y="563" class="small">Markdown findings</text>
  <text x="970" y="583" class="small">with evidence refs</text>

  <rect class="guard" x="930" y="150" width="210" height="92"/>
  <text x="955" y="188" class="text">Model Critic</text>
  <text x="955" y="215" class="small">Second pass claim</text>
  <text x="955" y="235" class="small">downgrade review</text>

  <rect class="artifact" x="70" y="320" width="230" height="92"/>
  <text x="95" y="358" class="text">Custody Hashes</text>
  <text x="95" y="385" class="small">Before/after SHA256</text>
  <text x="95" y="405" class="small">halt on spoliation</text>

  <path class="arrow" d="M280 196 H365"/>
  <path class="arrow" d="M575 196 H660"/>
  <path class="arrow" d="M785 242 V320"/>
  <path class="arrow" d="M910 196 H930"/>
  <path class="arrow" d="M1035 242 C1010 365 930 455 890 520"/>
  <path class="arrow" d="M660 366 H615"/>
  <path class="arrow" d="M365 366 H300"/>
  <path class="arrow" d="M470 412 V500"/>
  <path class="arrow" d="M470 412 C390 455 270 450 185 500"/>
  <path class="arrow" d="M595 548 H660"/>
  <path class="arrow" d="M890 548 H945"/>
  <path class="rail" d="M185 596 C260 665 795 665 1040 596"/>
  <text x="405" y="690" class="small">Core rule: no forensic claim is promoted unless a deterministic tool produced supporting evidence.</text>
</svg>
